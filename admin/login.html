<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swift-Bankin Control Console Terminal Entrance</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/login.js" defer></script>
    <link rel="icon" type="image/png" href="../images/favicon.png">
</head>

<body>

    <div class="admin-auth-wrapper">
        <div class="auth-matrix-card">

            <div class="auth-card-header">
                <div class="terminal-logo-container">
                    <i data-lucide="shield-check" class="secure-brand-icon"></i>
                </div>
                <h1 class="terminal-title">Swift-Bankin Admin</h1>
                <p class="terminal-subtitle">Authorize administrative clearing credentials</p>
            </div>

            <form id="admin-entrance-form" class="auth-form-pipeline" novalidate>

                <div class="input-form-group">
                    <label for="admin-email-field" class="form-input-label">Administrative Identifier Email</label>
                    <div class="field-interactive-container">
                        <i data-lucide="mail" class="field-vector-icon"></i>
                        <input type="email" id="admin-email-field" class="auth-input-element"
                            placeholder="admin@email.com" required>
                    </div>
                </div>

                <div class="input-form-group">
                    <label for="admin-pass-field" class="form-input-label">Security Access Phrase</label>
                    <div class="field-interactive-container">
                        <i data-lucide="lock" class="field-vector-icon"></i>
                        <input type="password" id="admin-pass-field" class="auth-input-element"
                            placeholder="••••••••••••••••" required>
                        <button type="button" id="pass-visibility-trigger" class="eye-reveal-action-btn">
                            <i data-lucide="eye-off"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-auth-action-btn" class="submit-auth-action-btn">
                    <span>Initialize Terminal Session</span>
                    <i data-lucide="arrow-right" class="btn-arrow-icon"></i>
                </button>

            </form>

            <div class="auth-card-footer">
                <p class="crypto-status-text">
                    <i data-lucide="terminal" class="inline-status-icon"></i>
                    Encrypted TLS 1.3 Settlement Node Connection Secure
                </p>
            </div>

        </div>
    </div>

</body>

</html>
