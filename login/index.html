<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        input,
        textarea,
        select {
            font-size: 16px;
            /* prevent iOS zoom on focus */
        }

        html,
        body {
            touch-action: manipulation;
            /* prevent double-tap zoom */
        }
    </style>

    <title>Swift-Bankin — Login</title>
    <link rel="icon" type="image/png" href="../dashboard/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <style>
        body {
            font-family: Inter, Arial, sans-serif;
            margin: 0;
            background: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo {
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .logo img {
            width: 160px;
            height: auto;
        }

        h2 {
            margin: 8px 0 6px;
            font-size: 22px;
            color: #0f172a;
        }

        .subtitle {
            font-size: 14px;
            color: #475569;
            margin-bottom: 24px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #21eaed;
            box-shadow: 0 0 0 3px rgba(14, 163, 101, 0.15);
        }

        .btn {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(90deg, #21eaed, #041036);
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #041036, #21eaed);
        }

        .footer-text {
            margin-top: 18px;
            font-size: 13px;
            color: #475569;
        }

        .footer-text a {
            color: #21eaed;
            text-decoration: none;
        }
    </style>


</head>

<body>
    <div class="login-card">
        <div class="logo">
            <img src="../logo.PNG" alt="Swift-Bankin Logo">
        </div>
        <div id="google_translate_element"> </div>
        <h2>Welcome back!</h2>
        <p class="subtitle">Please log in to access your account securely.</p>

        <form id="loginForm">
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>

            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Your password" required />
            </div>
            <a id="forgotPasswordLink" style="color: #041036; cursor: pointer;" href="#"><small>Forgot
                    password</small></a>
            <button type="submit" class="btn">Login</button>
        </form>

        <p class="footer-text">
            Don’t have an account? <a href="../register/index.html">Sign up</a>
        </p>
    </div>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en'
            }, 'google_translate_element');
        }

    </script>

    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    </div>



    <style>
        #google_translate_element {
            color: transparent;
        }

        #google_translate_element a {
            display: none;
        }

        .goog-te-banner-frame.skiptranslate {
            display: none !important;
        }

        body>.skiptranslate {
            display: none;
        }
    </style>


    <script src="index.js"></script>
</body>

</html>
